<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F3EE">
<title>口袋名單 — 我們的秘密基地</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🗺️</text></svg>">
<link rel="stylesheet" href="css/style.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-bg">
  <div class="login-deco deco-1"></div>
  <div class="login-deco deco-2"></div>
  <div class="login-deco deco-3"></div>
</div>

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">🗺️</span>
      <h1 class="logo-title">口袋名單</h1>
      <p class="logo-sub">我們的秘密基地 · 一起記錄好去處</p>
    </div>

    <div class="login-divider"><span>開始使用</span></div>

    <button class="btn-google" id="btn-google-login">
      <svg width="20" height="20" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
      用 Google 帳號登入
    </button>

    <div class="or-divider"><span>或者</span></div>

    <div>
      <p class="join-hint">有邀請碼？輸入後直接同步家人的口袋名單</p>
      <div class="code-input-row">
        <input type="text" id="invite-code-input" placeholder="6 位邀請碼" maxlength="6" autocomplete="off" style="text-transform:uppercase">
        <button class="btn-join" id="btn-join">加入</button>
      </div>
    </div>

    <p class="login-note">✨ 登入後即可與家人即時同步口袋名單</p>
  </div>
</div>

<div id="toast" class="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc, collection, query, where, getDocs, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";
import { firebaseConfig } from "./js/config.js";

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

function showToast(msg, type="") {
  const t = document.getElementById("toast");
  t.textContent = msg;
  t.className = "toast show " + type;
  setTimeout(() => t.className = "toast", 3000);
}

// Google 登入
document.getElementById("btn-google-login").addEventListener("click", async () => {
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    showToast("歡迎回來！" + (result.user.displayName || "").split(" ")[0]);
    // 確保有群組
    await ensureGroup(result.user);
    setTimeout(() => { window.location.href = "pages/app.html"; }, 800);
  } catch(e) {
    if (e.code !== "auth/popup-closed-by-user") {
      showToast("登入失敗，請再試一次", "error");
    }
  }
});

// 邀請碼加入
document.getElementById("btn-join").addEventListener("click", async () => {
  const code = document.getElementById("invite-code-input").value.trim().toUpperCase();
  if (code.length !== 6) { showToast("請輸入 6 位邀請碼", "error"); return; }

  showToast("驗證中...");
  try {
    // 查詢邀請碼
    const q = query(collection(db, "groups"), where("inviteCode", "==", code));
    const snap = await getDocs(q);
    if (snap.empty) { showToast("邀請碼無效", "error"); return; }

    const groupDoc = snap.docs[0];
    if (groupDoc.data().inviteExpiry < Date.now()) { showToast("邀請碼已過期", "error"); return; }

    // 先登入（Google 或匿名）
    let user = auth.currentUser;
    if (!user) {
      const provider = new GoogleAuthProvider();
      try {
        const result = await signInWithPopup(auth, provider);
        user = result.user;
      } catch(e2) {
        // 若取消 Google，用匿名
        const r2 = await signInAnonymously(auth);
        user = r2.user;
      }
    }

    await updateDoc(doc(db, "groups", groupDoc.id), {
      members: arrayUnion(user.uid),
      [`memberNames.${user.uid}`]: user.displayName || "家人"
    });
    await setDoc(doc(db, "users", user.uid), { uid: user.uid, groupId: groupDoc.id, joinedAt: Date.now(), displayName: user.displayName || "家人" }, { merge: true });

    showToast("成功加入！即時同步已開啟 🎉", "success");
    setTimeout(() => { window.location.href = "pages/app.html"; }, 900);
  } catch(e) {
    showToast("加入失敗：" + e.message, "error");
  }
});

// 確保用戶有群組
async function ensureGroup(user) {
  const userRef = doc(db, "users", user.uid);
  const snap = await getDoc(userRef);
  if (snap.exists() && snap.data().groupId) return snap.data().groupId;

  const groupId = "grp_" + Date.now();
  const code = Array.from({length:6}, () => "ABCDEFGHJKLMNPQRSTUVWXYZ23456789"[Math.floor(Math.random()*32)]).join("");

  await setDoc(doc(db, "groups", groupId), {
    createdBy: user.uid, createdAt: Date.now(),
    members: [user.uid],
    memberNames: { [user.uid]: user.displayName || user.email || "你" },
    inviteCode: code, inviteExpiry: Date.now() + 7*24*60*60*1000
  });
  await setDoc(userRef, { uid: user.uid, displayName: user.displayName || "", email: user.email || "", groupId, joinedAt: Date.now() }, { merge: true });
  return groupId;
}

// 已登入直接跳轉
onAuthStateChanged(auth, (user) => {
  if (user) window.location.href = "pages/app.html";
});
</script>
</body>
</html>
