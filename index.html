<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#F7F3EE">
<title>口袋名單 — 我們的秘密基地</title>
<link rel="stylesheet" href="style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
</head>
<body class="login-page">

<div class="login-container">
  <div class="login-card">
    <div class="login-logo">
      <span class="logo-icon">🗺️</span>
      <h1 class="logo-title">口袋名單</h1>
      <p class="logo-sub">我們的秘密基地 · 一起記錄好去處</p>
    </div>

    <button class="btn-google" id="btn-google-login" style="background: #4285F4; color: white; border: none; padding: 12px 24px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 16px;">
      用 Google 帳號登入
    </button>

    <div id="status-msg" style="margin-top: 20px; font-size: 14px; color: #8B6B4A; text-align: center;">
      等待登入中...
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBqjIwARGN1KOpvXubFA6eanLyPfQfDi5A",
  authDomain: "favorite-74e87.firebaseapp.com",
  projectId: "favorite-74e87",
  storageBucket: "favorite-74e87.firebasestorage.app",
  messagingSenderId: "909094354338",
  appId: "1:909094354338:web:9a4c1909f80919c2f4c6fb"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

const statusMsg = document.getElementById("status-msg");

document.getElementById("btn-google-login").addEventListener("click", async () => {
  statusMsg.innerText = "正在開啟登入視窗...";
  try {
    const provider = new GoogleAuthProvider();
    const result = await signInWithPopup(auth, provider);
    statusMsg.innerText = "登入成功！正在跳轉...";
    localStorage.setItem('fb_config', JSON.stringify(firebaseConfig));
    window.location.href = "app.html";
  } catch(e) {
    console.error(e);
    statusMsg.innerText = "錯誤: " + e.message;
    alert("登入遇到問題：\n1. 請檢查 Firebase 授權網域是否包含 yamap610.github.io\n2. 錯誤訊息：" + e.message);
  }
});

onAuthStateChanged(auth, (user) => {
  if (user) {
    statusMsg.innerText = "偵測到已登入，準備進入...";
    localStorage.setItem('fb_config', JSON.stringify(firebaseConfig));
    window.location.href = "app.html";
  }
});
</script>
</body>
</html>
